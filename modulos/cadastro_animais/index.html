<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Wanderley Lopes Batista">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/estilo_petshop.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="../../js/petshop.js"></script>

</head>

<body>

    <header class="cabecalho-site">
        <div class="container-cabecalho">
        <h1 class="logo">Portal Pet Shop</h1>
        <nav class="navegacao">
            <ul class="menu">
            <li><a href="../../index.html" >Página Inicial</a></li>
            <li><a href="../cadastro_animais/index.html" class="ativo">Cadastro de Animais</a></li>
            <li><a href="../calculadora_racao/index.html">Calculadora de Ração</a></li>
            <li><a href="../../index.html#servicos">Serviços</a></li>
            <li><a href="../../index.html#contato">Contato</a></li>
            </ul>
        </nav>
        </div>
    </header>

    <fieldset style="margin-top:20px; box-sizing:border-box;">
        <legend><strong>DADOS DO PET</strong></legend>

        <form onsubmit="cadastrarPet(); return false;">

            <label><strong>Nome do Animal:</strong></label><br>
            <input type="text" id="nome" style="width: 98%; padding: 10px;" required><br><br>

            <label><strong>Espécie:</strong></label><br>
            <select id="especie">
                <option>Cachorro</option>
                <option>Gato</option>
                <option>Pássaro</option>
                <option>Coelho</option>
                <option>Hamster</option>
                <option>Tartaruga</option>
                <option>Peixe</option>
                <option>Porquinho-da-Índia</option>
                <option>Outro</option>
            </select><br><br>

            <label><strong>Sexo:</strong></label><br>
            <input type="radio" name="sexo" value="Macho"> Macho
            <input type="radio" name="sexo" value="Fêmea"> Fêmea<br><br>

            <label><strong>Serviços:</strong></label><br>
            <input type="checkbox" class="serv" value="Banho"> Banho
            <input type="checkbox" class="serv" value="Tosa"> Tosa
            <input type="checkbox" class="serv" value="Consulta"> Consulta Veterinária
            <input type="checkbox" class="serv" value="Vacinacao"> Vacinação
            <input type="checkbox" class="serv" value="Hospedagem"> Hospedagem<br><br>

            <label><strong>Data de nascimento:</strong></label><br>
            <input type="date" name="data_nascimento" id="data_nascimento"><br><br>

            <input type="submit" value="CADASTRAR PET" style="padding: 10px 20px; cursor: pointer;">
        </form>
    </fieldset>

    <div id="resultado" style="margin-top: 20px; min-height: 50px;"></div>

    <!-- Rodapé da página -->
    <footer id="rodape" class="rodape-site">
        <!-- Texto de direitos autorais -->
        <p>© 2026 - Portal Pet Shop | Desenvolvido para fins educacionais</p>
    </footer>

</body>

</html>
